name: skill_swap_marketplace
description: "Skill Swap Marketplace - A time-banking platform where users exchange skills using time credits"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  firebase_storage: ^12.3.7
  google_sign_in: ^6.2.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3

  # Forms
  flutter_form_builder: ^9.5.0
  form_builder_validators: ^11.0.0

  # Utils
  intl: ^0.20.1
  uuid: ^4.5.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  timeago: ^3.7.0

  # Local Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Other utilities
  equatable: ^2.0.7
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
