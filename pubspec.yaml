name: skill_swap_marketplace
description: "Skill Swap Marketplace - A time-banking platform where users exchange skills using time credits"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1
  google_sign_in: ^6.2.2

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking & Error Handling
  dio: ^5.4.1
  fpdart: ^1.1.0

  # Navigation
  go_router: ^13.2.0

  # Code Generation (Models)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # UI
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3

  # Forms
  flutter_form_builder: ^9.5.0
  form_builder_validators: ^11.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  timeago: ^3.7.0
  equatable: ^2.0.7

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.4

  # Local Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.4.7
  json_serializable: ^6.9.0
  go_router_builder: 2.7.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#2563EB"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

# Native Splash Screen Configuration
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icons/splash_icon.png"
  image_dark: "assets/icons/splash_icon.png"
  color_dark: "#1F2937"
  android_12:
    color: "#FFFFFF"
    color_dark: "#1F2937"
    image: "assets/icons/splash_icon.png"
    image_dark: "assets/icons/splash_icon.png"
  ios: true
  android: true
  web: false